# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: ["main", "develop", "feature/**", "fix/**"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.os }} / Go ${{ matrix.go }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ["1.22", "1.23"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go ${{ matrix.go }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: Verify go.mod is consistent
        run: go mod verify

      - name: Run go vet
        run: go vet ./...

      - name: Build binary
        run: go build ./...

      - name: Run tests with race detector
        run: go test ./... -race -count=1 -timeout=120s

      - name: Validate no placeholder strings (Linux only)
        if: runner.os == 'Linux'
        run: |
          if grep -rn "username/symphony" \
               --include="*.go" \
               --include="*.yaml" \
               --include="*.sh" \
               --exclude-dir=".git" . 2>/dev/null; then
            echo "FAIL: Placeholder module path still exists in codebase"
            exit 1
          fi
          echo "OK: No placeholder strings found"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
          args: --timeout=5m

  coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
      - name: Generate coverage report
        run: |
          go test ./... -coverprofile=coverage.out -covermode=atomic
          go tool cover -func=coverage.out | tail -1
      - name: Upload coverage to Codecov (optional)
        uses: codecov/codecov-action@v4
        continue-on-error: true
        with:
          file: coverage.out
          fail_ci_if_error: false
